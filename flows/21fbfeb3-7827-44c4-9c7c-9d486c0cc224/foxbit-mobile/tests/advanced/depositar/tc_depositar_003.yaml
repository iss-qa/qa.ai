### ---
#  Id: Depositar-003
#  Name: Depósito Comum (DOC/TED)
#  Description: Validar fluxo de depósito em BRL via DOC/TED, conferindo dados bancários e envio de comprovante
#  Gherkin: test-cases/advanced/depositar/depositar.feature
### ---
appId: br.com.foxbit.foxbitandroid
---
- runFlow: "../../common/setup.yaml"
- runScript: "../../common/env.js"
- runScript: "../../pages/common.js"
- runScript: "../../pages/inicio.js"
- runScript: "../../pages/comprar.js"

###############################################
# VALIDAR DEPOSITO COMUM
- assertVisible:
    id: ${output.INICIO.botaoDepositar}
- tapOn:
    id: ${output.INICIO.botaoDepositar}
- waitForAnimationToEnd:
    timeout: 3000
# Screenshot - Tela de busca de moeda
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/01_busca_moeda"
- assertVisible: Buscar
- tapOn: Buscar
- inputText: "BRL"
- assertVisible:
    id: ${output.COMMON.tileMoedaListagem}
- tapOn:
    id: ${output.COMMON.tileMoedaListagem}
# Screenshot - Tela de informar valor
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/02_informar_valor"
- assertVisible: "1"
- assertVisible: "0"
# DEPOSITAR 10 REAIS
- tapOn: "1"
- tapOn: "0"
- tapOn: "0"
- tapOn: "0"
- assertVisible:
    id: ${output.COMMON.botaoContinuarValor}
- tapOn:
    id: ${output.COMMON.botaoContinuarValor}

# Validar Opcoes
# Screenshot - Tela de selecionar método de depósito
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/03_selecionar_metodo"
- assertVisible: Selecione uma opção
# Validar o Deposito Comum
- assertVisible:
    id: ${output.COMMON.cardMetodoComum}
- tapOn:
    id: ${output.COMMON.cardMetodoComum}
# Screenshot - Tela de detalhes depósito comum
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/04_detalhes_deposito_comum"
- assertVisible: Depósito em Real (BRL)
- assertVisible:
    text: ".*Banco Genial S.A.*"
- assertVisible:
    id: ${output.COMMON.tileValor}
- assertVisible:
    id: ${output.COMMON.tileBanco}
- assertVisible:
    id: ${output.COMMON.tileAgencia}
- assertVisible:
    id: ${output.COMMON.tileConta}
- assertVisible: |-
    Tipo:
    Conta Corrente
- assertVisible:
    id: ${output.COMMON.tileTitular}
- assertVisible:
    id: ${output.COMMON.tileCpfCnpj}
- assertVisible: |-
    Método:
    DOC e TED
- assertVisible:
    id: ${output.COMMON.botaoAcordeon}
- tapOn:
    id: ${output.COMMON.botaoAcordeon}
# Screenshot - Orientações depósito comum
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/05_orientacoes_deposito_comum"
- assertVisible:
    id: ${output.COMMON.botaoAcao}
- tapOn:
    id: ${output.COMMON.botaoAcao}

# TODO - implementar posteriormente o anexo do doc.
# Screenshot - Tela de anexo de comprovante
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/06_anexo_comprovante"
- assertVisible: Tirar foto
- assertVisible: Escolher foto na galeria
- assertVisible: Procurar arquivos
- tapOn: Voltar
- tapOn: Voltar
- tapOn: Voltar
- tapOn: Voltar
- tapOn: Voltar


- assertNotVisible:
    id: inp_login_email
- tapOn: |-
    E-mail
    Digite seu e-mail
- doubleTapOn:
    id: inp_login_email
    delay: 100
- tapOn:
    point: 4%,51%

- tapOn:
    id: inp_login_email
