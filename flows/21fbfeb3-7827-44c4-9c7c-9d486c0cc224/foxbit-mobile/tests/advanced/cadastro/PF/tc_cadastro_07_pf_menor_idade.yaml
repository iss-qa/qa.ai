appId: br.com.foxbit.foxbitandroid
---
- runFlow:
    when:
      true: ${SKIP_LAUNCH != 'true'}
    commands:
      - clearState
- runFlow: "../../../common/setup.yaml"
- runScript: "../../../common/env.js"

- runScript: "../../../pages/login.js"
- runScript: "../../../pages/cadastro.js"
- runScript: "../../../pages/login.js"

- runScript:
    file: "../../../common/generate_email.js"
    env:
      EMAIL_PREFIX: "automacao_pf_menor"

- waitForAnimationToEnd:
    timeout: 10000

# INICIO DO CADASTRO
- tapOn:
    id: ${output.LOGIN.botaoCriarConta}
- assertVisible:
    text: ".*Crie sua conta..*"
- assertVisible:
    text: ".*E-mail e senha.*"

- tapOn: "E-mail"
- inputText: ${output.TEMP_EMAIL}

- tapOn: "Crie uma senha"
- inputText: ${output.TEMP_PASSWORD}
- hideKeyboard

- tapOn: "Ao criar a sua conta na Foxbit.*"
- tapOn: "Continuar"

- runFlow: "../../../advanced/cadastro/verify_email.yaml"

- waitForAnimationToEnd:
    timeout: 1000

# CASO FALHE, PROBLEMA NO RECAPTCHA QUE NAO DEIXOU AVANCAR
- assertVisible:
    text: ".*Complete o cadastro..*"
- assertVisible:
    text: ".*Terminar sessão.*"
- tapOn: "Terminar sessão"

# ABRE O APP PARA CONCLUIR A CRIACAO DA CONTA (limpa a WebView / Background)
- stopApp: br.com.foxbit.foxbitandroid

# Fechar o Google Chrome
- stopApp: com.android.chrome

- launchApp:
    appId: br.com.foxbit.foxbitandroid
    clearState: false

- runScript: "../../../pages/login.js"
- runScript: "../../../pages/login.js"

- waitForAnimationToEnd:
    timeout: 10000

- assertVisible:
    text: ".*Criar conta.*"
- assertVisible:
    text: ".*Entrar.*"
- tapOn: "Entrar"

- tapOn: "Digite seu e-mail"
- inputText: ${output.TEMP_EMAIL}

- tapOn: "Digite sua senha"
- inputText: ${output.TEMP_PASSWORD}
- hideKeyboard

- tapOn: "Entrar"

- assertVisible:
    text: ".*Complete o cadastro..*"
- assertVisible:
    text: ".*Pessoas individuais Pessoa física.*"
- tapOn: "Pessoas individuais Pessoa física"
- tapOn: "Continuar"

- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/menor_dados_pessoais"

- runScript: "../../../common/generate_user_data.js"

# TELA DE INFORMACOES PESSOAIS
- assertVisible:
    text: ".*Informações pessoais.*"
- tapOn: "Nome completo"
- inputText: ${output.USER_NAME}
- hideKeyboard

- waitForAnimationToEnd:
    timeout: 10000

- tapOn: "CPF"
- inputText: ${output.USER_CPF}
- hideKeyboard

# ============================================================
# CENARIO 1: Menor de 16 anos (nascido em 2010, tem 16 em 2026)
# Esperado: NÃO permitir continuar
# ============================================================
- tapOn: "Dia"
- inputText: "01"

- tapOn: "Mês"
- inputText: "01"

- tapOn: "Ano"
- inputText: "2010"
- hideKeyboard

- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/menor_16_anos_preenchido"

# Tenta avançar - botão deve estar desabilitado ou exibir mensagem de erro
- tapOn: "Continuar"

- runScript:
    file: "../../../common/wait.js"
    env:
      MS: 3000

- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/menor_16_anos_erro"

# ============================================================
# CENARIO 2: Menor de 17 anos (nascido em 2009, tem 17 em 2026)
# Esperado: PERMITIR continuar
# ============================================================

# Limpar o campo Ano e reinserir com 2009
- tapOn: "Ano"
- eraseText: 10
- inputText: "2009"
- hideKeyboard

- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/menor_17_anos_preenchido"

- assertVisible:
    text: ".*Continuar.*"
- tapOn: "Continuar"

# TELA DE ENDERECO - validando que avançou com sucesso
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/menor_dados_endereco"

- assertVisible:
    text: ".*Complete o cadastro..*"
- assertVisible:
    text: "Endereço"
    index: 0

- tapOn: "País de residência"
- assertVisible:
    text: ".*Brasil.*"
- tapOn: "Brasil"

- assertVisible:
    text: "CEP"
    index: 0

- tapOn: "CEP"
- inputText: "42739100"
- hideKeyboard

# Preenchimento automático de endereço
# - tapOn: "Cidade"
# - eraseText: 50
# - inputText: "Lauro de Freitas"
# - hideKeyboard

# - tapOn: "Estado"
# - tapOn: "Bahia"

# - scroll

# - tapOn: "Bairro"
# - eraseText: 50
# - inputText: "Itinga"
# - hideKeyboard

# - tapOn: "Endereço"
# - eraseText: 50
# - inputText: "Rua Cacule"
# - hideKeyboard

- scroll
- tapOn: "Número"
- inputText: "123"
- hideKeyboard

- tapOn: "Complemento"
- inputText: "Apto 123"
- hideKeyboard

- tapOn:
    text: "Como conheceu a Foxbit?"
    index: 1
- assertVisible:
    text: ".*Google.*"
- tapOn: "Google"

- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/menor_endereco_preenchido"

- assertVisible:
    text: "Declaro para fins de comprovação de residência, sob as penas da Lei (art. 2º da Lei 7.115/83), que resido no endereço acima."
    index: 0

- tapOn:
    text: "Declaro para fins de comprovação de residência, sob as penas da Lei (art. 2º da Lei 7.115/83), que resido no endereço acima."
    index: 1

- assertVisible:
    text: ".*Todos os dados prestados serão validados. Inclua informações completas e verdadeiras..*"
- tapOn: "Concluir"

# CONTA CRIADA JA DENTRO DA PLATAFORMA
- assertVisible:
    text: ".*Muito bem, sua conta foi criada com sucesso!.*"
- assertVisible:
    text: ".*Entrar na plataforma.*"
- tapOn: "Entrar na plataforma"

# Aguarda até 5 segundos caso o modal demore
- runScript:
    file: "../../../common/wait.js"
    env:
      MS: 5000

# Se aparecer o botão "Close" (X da propaganta), ele clica nele
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"

- assertVisible:
    text: ".*Ações rápidas.*"
- assertVisible:
    text: ".*Ativos.*"
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/menor_tela_inicio"
