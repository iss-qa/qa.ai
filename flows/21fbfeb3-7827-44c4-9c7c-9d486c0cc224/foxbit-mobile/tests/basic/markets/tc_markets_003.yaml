- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/16_filtro_rapido_menor_preco"

# 4.6 Alfabético
- tapOn:
    id: ${output.MARKETS.iconFilter}
- tapOn: "Alfabético"
- tapOn: Filtrar
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible:
    text: ".*BRL.*"
- takeScreenshot: "${output.SCREENSHOT_DIR_DYNAMIC}/17_filtro_rapido_alfabetico"

# Reset para a Home
- hideKeyboard
- tapOn:
    id: ${output.INICIO.botaoInicio}
- waitForAnimationToEnd:
    timeout: 2000
