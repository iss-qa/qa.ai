# ============================================================
# QAMind — Premissas Globais de Teste
# ============================================================
# Este arquivo define regras que são aplicadas automaticamente
# em TODOS os testes gerados, independente do projeto.
#
# Edite à vontade. O daemon recarrega na próxima execução.
# ============================================================

global:

  # Após launchApp, sempre inserir waitForAnimationToEnd
  # Evita que o próximo passo falhe porque a tela ainda está animando
  after_launch_wait: true

  # Timeout padrão para extendedWaitUntil (milissegundos)
  # Apps lentos podem precisar de 15000 ou 20000
  default_wait_timeout_ms: 10000

  # Máximo de seletores alternativos que o Smart Retry vai tentar
  # Ordem: semantics_id > resource_id > text > hint > content_desc > coordenadas
  smart_retry_max_tries: 6


# ============================================================
# REGRAS DE MONTAGEM DOS PASSOS (CRITICAS)
# ============================================================
# Estas regras DEVEM ser seguidas na geracao de qualquer teste.
# Violacao destas regras = teste que vai falhar.
# ============================================================
step_generation:

  # REGRA 1: NUNCA interpretar o prompt de forma literal.
  # O usuario escreve em linguagem natural. Os seletores no YAML
  # devem conter SOMENTE o texto EXATO visivel na tela do app.
  #
  # ERRADO: visible: "botao Entrar"     (a palavra "botao" nao existe na UI)
  # CERTO:  visible: "Entrar"           (texto real do botao)
  #
  # ERRADO: tapOn: "Entrar para realizar o login"
  # CERTO:  tapOn: "Entrar"
  #
  # ERRADO: visible: "botao Entrar ficar habilitado"
  # CERTO:  visible: "Entrar"
  #
  # ERRADO: visible: "email"
  # CERTO:  visible: "Digite seu e-mail"  (placeholder real do campo)
  never_use_literal_description: true

  # REGRA 2: Sempre analisar imagens de referencia ANTES de montar steps.
  # Se o usuario anexou screenshots, a IA DEVE:
  #   a) Identificar todos os elementos visiveis na imagem
  #   b) Extrair textos exatos dos botoes, labels, placeholders
  #   c) Usar esses textos exatos nos seletores
  #   d) Cruzar com a hierarquia Android (se disponivel) para obter IDs
  analyze_images_first: true

  # REGRA 3: Hierarquia de seletores para cada passo:
  #   1. resource-id (se disponivel na hierarquia XML)
  #   2. Texto EXATO visivel na tela (extraido da imagem ou XML)
  #   3. Placeholder/hint do campo
  #   4. content-description
  #   5. Coordenadas (ULTIMO recurso)
  selector_priority:
    - resource_id
    - text_exact
    - placeholder
    - content_description
    - coordinates

  # REGRA 4: Palavras que NUNCA devem aparecer nos seletores
  # Estas sao palavras do prompt do usuario, nao da UI real
  forbidden_selector_words:
    - botao
    - campo
    - tela
    - aba
    - menu
    - icone
    - link
    - elemento
    - ficar
    - habilitado
    - visivel
    - aparecer
    - para
    - realizar
    - fazer
    - acessar
    - iniciar
    - confirmar que

  # REGRA 5: Montar passos UM A UM com validacao
  # Antes de gerar o proximo passo, confirmar que o seletor
  # do passo atual existe na imagem ou hierarquia XML.
  validate_each_step: true


# ============================================================
# Pacotes de apps conhecidos
# Adicione seus apps aqui para evitar resolução via ADB
# ============================================================
app_packages:
  wastezero: com.app.wastezero_app
  foxbit: br.com.foxbit.foxbitandroid
  settings: com.android.settings
  configuracoes: com.android.settings


# ============================================================
# Referências visuais por projeto
# Coloque screenshots dos elementos-chave do app para ajudar
# o Smart Retry a identificar elementos na tela.
#
# Formato:
#   <project_id>:
#     <nome_do_elemento>:
#       screenshot: data/visual_refs/<project_id>/<arquivo>.png
#       descricao: "O que é esse elemento"
# ============================================================
visual_refs:
  foxbit_mobile:
    campo_busca:
      screenshot: data/visual_refs/foxbit_mobile/campo_busca.png
      descricao: "Campo de busca na tela inicial - texto 'Busque seu produto'"


# ============================================================
# Elementos comuns (aliases reutilizáveis)
# Use para mapear descrições em português para seletores reais
# ============================================================
common_elements:
  busca:
    text: "Busque seu produto"
    hint: "Busque seu produto"
    resource_id: "search_field"

  login_email:
    text: "E-mail"
    hint: "Digite seu e-mail"
    resource_id: "email_input"

  login_senha:
    text: "Senha"
    hint: "Digite sua senha"
    resource_id: "password_input"
